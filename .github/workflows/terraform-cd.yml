name: CD - GCP Cloud Run Container (Apply / Destroy)

on:
  workflow_dispatch:
    inputs:
      command:
        description: Terraform operation
        required: true
        type: choice
        options:
          - apply
          - destroy
        default: apply
      project_id:
        description: GCP project ID
        required: true
        type: string
      region:
        description: "GCP region (Free Tier: us-east1, us-west1, us-central1)"
        required: true
        type: string
        default: us-central1
      service_name:
        description: Name of the Cloud Run service
        required: true
        type: string
        default: nginx-service
      image_url:
        description: Container image URL
        required: true
        type: string
        default: nginx:latest

env: {}

jobs:
  provision:
    name: Terraform ${{ github.event.inputs.command }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest
      - name: Terraform Init
        run: terraform init
      - name: Terraform Plan
        run: |
          terraform plan ${{ github.event.inputs.command == 'destroy' && '-destroy' || '' }} \
            -var="project_id=${{ github.event.inputs.project_id }}" \
            -var="region=${{ github.event.inputs.region }}" \
            -var="service_name=${{ github.event.inputs.service_name }}" \
            -var="image_url=${{ github.event.inputs.image_url }}"
      - name: Terraform Apply / Destroy
        run: |
          terraform ${{ github.event.inputs.command }} -auto-approve \
            -var="project_id=${{ github.event.inputs.project_id }}" \
            -var="region=${{ github.event.inputs.region }}" \
            -var="service_name=${{ github.event.inputs.service_name }}" \
            -var="image_url=${{ github.event.inputs.image_url }}"
